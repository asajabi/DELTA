{% extends "inventory/base.html" %}

{% block title %}استعادة كلمة المرور | دلتا{% endblock %}

{% block content %}
<div class="container" style="max-width: 520px;">
    <div class="card delta-card p-4">
        <h1 class="h4 mb-2">استعادة كلمة المرور</h1>
        <p class="text-muted mb-4">أدخل اسم المستخدم والبريد الإلكتروني أو الجوال المسجل لاستلام رمز تحقق صالح لمدة 15 دقيقة.</p>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="id_username">اسم المستخدم</label>
                <input id="id_username" type="text" name="username" class="form-control" value="{{ username }}" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" for="id_channel">طريقة الاستلام</label>
                <select id="id_channel" name="channel" class="form-select">
                    <option value="email" {% if channel == 'email' %}selected{% endif %}>البريد الإلكتروني</option>
                    <option value="phone" {% if channel == 'phone' %}selected{% endif %}>الجوال</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" for="id_contact">البريد الإلكتروني أو رقم الجوال</label>
                <input id="id_contact" type="text" name="contact" class="form-control" value="{{ contact }}" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">إرسال رمز التحقق</button>
        </form>

        <hr>
        <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100">العودة إلى تسجيل الدخول</a>
    </div>
</div>
{% endblock %}
