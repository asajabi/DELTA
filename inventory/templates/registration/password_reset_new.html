{% extends "inventory/base.html" %}

{% block title %}تعيين كلمة مرور جديدة | دلتا{% endblock %}

{% block content %}
<div class="container" style="max-width: 520px;">
    <div class="card delta-card p-4">
        <h1 class="h4 mb-2">تعيين كلمة مرور جديدة</h1>
        <p class="text-muted mb-4">الحساب: <strong>{{ username }}</strong></p>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="id_new_password1">كلمة المرور الجديدة</label>
                <input id="id_new_password1" type="password" name="new_password1" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" for="id_new_password2">تأكيد كلمة المرور</label>
                <input id="id_new_password2" type="password" name="new_password2" class="form-control" required>
            </div>
            <button class="btn btn-success w-100" type="submit">حفظ كلمة المرور</button>
        </form>
    </div>
</div>
{% endblock %}
